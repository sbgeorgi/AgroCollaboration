<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50 antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Member Network • Agrovoltaicos sin Fronteras</title>
    <meta name="description" content="Interactive network visualization of our community members and their connections.">
    <script src="auth-preloader.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="theme.js"></script>
    <style>
        /* ── Base Layout ── */
        body { overflow-y: auto; }
        @media (min-width: 768px) { body { overflow: hidden; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; background-clip: content-box; border: 2px solid transparent; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: #94a3b8; }

        /* ── Network Container ── */
        #network-container {
            cursor: grab;
            background-color: #f8fafc;
            background-image:
                radial-gradient(#e2e8f0 1px, transparent 1px),
                radial-gradient(#f1f5f9 1px, transparent 1px);
            background-size: 40px 40px, 10px 10px;
            background-position: 0 0, 20px 20px;
            touch-action: none;
            overflow: hidden;
            height: 500px;
            flex-grow: 0;
            flex-shrink: 0;
            /* Establish a clean stacking context */
            isolation: isolate;
            position: relative;
        }
        #network-container:active { cursor: grabbing; }

        /* ── Network Canvas (bubble view) ── */
        #networkCanvas {
            transform-origin: 0 0;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Removed will-change here — applied only when panning */
            /* Removed transform-style: preserve-3d — causes compositing explosion */
        }
        #networkNodes,
        .network-connections {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .network-connections { overflow: visible; }

        /* ── Network Nodes ── */
        .network-node {
            position: absolute;
            transform: translate(-50%, -50%) translateZ(0);
            backface-visibility: hidden;
            cursor: pointer;
            pointer-events: auto;
            /* No global will-change — promoted per-node only during interaction */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            -webkit-user-select: none;
            z-index: 20;
            contain: layout style;
        }
        .network-node.is-interacting {
            transition: none !important;
            z-index: 500 !important;
            will-change: transform;
        }
        .network-node.magnified { z-index: 1000 !important; }
        .group-node { z-index: 5; }

        .bubble-group {
            border-radius: 50%;
            opacity: 0.85;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 2px solid rgba(255,255,255,0.5);
        }
        .bubble-group:hover { opacity: 1; box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
        .bubble-member { border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .network-edge { fill: none; stroke: #cbd5e1; stroke-width: 1.5px; stroke-opacity: 0.3; }
        .collab-edge { fill: none; stroke: #f59e0b; stroke-width: 2px; stroke-opacity: 0.5; stroke-dasharray: 4; }
        .dock-track { stroke: #cbd5e1; stroke-width: 4px; stroke-linecap: round; opacity: 0.3; }

        /* ── Table ── */
        th[data-sort] { user-select: none; }
        th.sort-asc::after  { content: ' ▲'; font-size: 10px; margin-left: 4px; color: #4f46e5; }
        th.sort-desc::after { content: ' ▼'; font-size: 10px; margin-left: 4px; color: #4f46e5; }

        /* ── Drag Handle ── */
        #dragHandle {
            height: 10px;
            background: #f1f5f9;
            cursor: row-resize;
            width: 100%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            transition: background-color 0.2s;
            touch-action: none;
        }
        #dragHandle:hover,
        #dragHandle.dragging { background: #e2e8f0; }
        #dragHandle::after { content: ''; width: 40px; height: 4px; background-color: #cbd5e1; border-radius: 2px; }

        /* ── Flash Toast ── */
        #flash {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            background-color: #0f172a;
            color: white;
            padding: 10px 20px;
            border-radius: 9999px;
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 9999;
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        #flash.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ══════════════════════════════════════════
           TREEMAP STYLES — Complete Rewrite
           Key principles:
           - Tiles are atomic: contain: layout style paint
           - Labels live in a SEPARATE overlay layer (z-index 200)
             so they NEVER compete with tile stacking contexts
           - No treemapPop on re-renders, only on first mount
             via .tm-animate class toggled after RAF
           - Hardware-accelerated hover via translateZ trick
        ══════════════════════════════════════════ */

        .treemap-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            background: #f8fafc;
            /* own stacking context, clean slate */
            isolation: isolate;
        }

        /* The tiles layer — clips to container bounds */
        .treemap-tiles-layer {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        /* The labels overlay — sits on TOP of ALL tiles, never clipped */
        .treemap-labels-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 200;
            overflow: visible;
        }

        /* ── Group Tile ── */
        .treemap-group-tile {
            position: absolute;
            overflow: hidden;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.85);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            /* contain: strict prevents reflow from bubbling up */
            contain: layout style paint;
            /* GPU layer for smooth compositing */
            will-change: box-shadow, border-color;
            transition:
                box-shadow  0.22s cubic-bezier(0.16,1,0.3,1),
                border-color 0.22s ease;
        }
        .treemap-group-tile:hover {
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
            border-color: rgba(99,102,241,0.75);
            z-index: 10;
        }
        /* Pop animation — applied AFTER insertion to avoid tear */
        @keyframes tmPop {
            from { opacity: 0; transform: scale(0.97); }
            to   { opacity: 1; transform: scale(1); }
        }
        .treemap-group-tile.tm-animate {
            animation: tmPop 0.28s cubic-bezier(0.16,1,0.3,1) backwards;
        }

        /* ── Group Header — rendered inside tile, kept inside overflow:hidden ── */
        .treemap-group-header {
            /* Absolute at top so it clips naturally with the tile */
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 6px 10px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            /* Critical: keep header above member tiles inside the same stacking context */
            z-index: 10;
            /* Prevent header from expanding tile height */
            box-sizing: border-box;
            /* The height is a CSS variable set per-tile */
            height: var(--header-h, 30px);
            overflow: hidden;
        }
        .treemap-group-header-name {
            font-size: 11px;
            font-weight: 800;
            color: #0f172a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
            letter-spacing: -0.01em;
        }
        .treemap-group-header-count {
            font-size: 9px;
            font-weight: 800;
            color: #4f46e5;
            background: #e0e7ff;
            padding: 2px 7px;
            border-radius: 9999px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* ── Members Area — offset below header ── */
        .treemap-members-area {
            position: absolute;
            left: 0; right: 0;
            bottom: 0;
            /* top is set inline = header height */
            overflow: hidden;
        }

        /* ── Member Tile ── */
        .treemap-member-tile {
            position: absolute;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.35);
            contain: layout style paint;
            /* use transform for hover scale — no layout cost */
            transition: transform 0.18s cubic-bezier(0.16,1,0.3,1),
                        box-shadow 0.18s ease;
            will-change: transform;
            /* Ensure tiles don't bleed outside their group */
            backface-visibility: hidden;
        }
        .treemap-member-tile:hover {
            /* scale via transform — composited, no reflow */
            transform: scale(1.05) translateZ(0);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            z-index: 50;
            border-color: rgba(255,255,255,0.85);
        }
        /* Member tile pop — staggered via CSS var */
        .treemap-member-tile.tm-animate {
            animation: tmPop 0.22s cubic-bezier(0.16,1,0.3,1) backwards;
            animation-delay: var(--tm-delay, 0s);
        }

        /* ── Ambient Background (cinematic blur) ── */
        .treemap-ambient-bg {
            position: absolute;
            inset: -20%;
            background-size: cover;
            background-position: center;
            filter: blur(18px) brightness(0.82);
            opacity: 0.65;
            z-index: 0;
            pointer-events: none;
            transition: opacity 0.18s, filter 0.18s;
            will-change: filter, opacity;
        }
        .treemap-member-tile:hover .treemap-ambient-bg {
            opacity: 0.88;
            filter: blur(12px) brightness(0.72);
        }

        /* ── Smart Content Wrapper ── */
        .treemap-smart-wrapper {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            pointer-events: none;
            /* gap set inline */
        }
        .treemap-smart-avatar {
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 3px 12px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.9);
            flex-shrink: 0;
            background: #e2e8f0;
            display: block;
        }
        .treemap-smart-initials {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            background: rgba(0,0,0,0.28);
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            flex-shrink: 0;
        }
        .treemap-smart-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
            text-shadow: 0 1px 5px rgba(0,0,0,0.85);
            min-width: 0;
        }
        .treemap-smart-name {
            font-weight: 800;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .treemap-smart-role {
            font-weight: 600;
            color: rgba(255,255,255,0.82);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* Full-tile avatar / initials fallback for tiny tiles */
        .treemap-member-avatar-full {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            inset: 0;
        }
        .treemap-member-initials-full {
            font-weight: 800;
            color: rgba(255,255,255,0.92);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            position: relative;
            z-index: 10;
        }

        /* ── Hover Tooltip (name + affiliation) ── */
        .treemap-member-tooltip {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.82));
            padding: 10px 8px 6px;
            opacity: 0;
            transition: opacity 0.18s;
            pointer-events: none;
            z-index: 25;
        }
        .treemap-member-tile:hover .treemap-member-tooltip { opacity: 1; }
        .treemap-member-tooltip-name {
            font-size: 10px;
            font-weight: 800;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .treemap-member-tooltip-aff {
            font-size: 9px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
            margin-top: 1px;
        }

        /* ── Badges ── */
        .treemap-badge {
            position: absolute;
            background: rgba(0,0,0,0.62);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-weight: 800;
            border-radius: 9999px;
            pointer-events: none;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            padding: 2px 7px;
            font-size: 9px;
        }
        .treemap-badge-speaker {
            background: rgba(245,158,11,0.88);
            border-color: rgba(255,255,255,0.4);
        }

        /* ── Breadcrumb — rendered in LABELS LAYER ── */
        .treemap-breadcrumb {
            /* positioned inside labels-layer (absolute, z:200) */
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto; /* labels layer is normally none, override here */
        }
        .treemap-breadcrumb-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 800;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            color: #1e293b;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }
        .treemap-breadcrumb-btn:hover {
            background: #ffffff;
            border-color: #c7d2fe;
            box-shadow: 0 5px 14px rgba(0,0,0,0.13);
        }

        /* ── Group labels rendered in LABELS LAYER ── */
        .treemap-group-label {
            position: absolute;
            /* top/left set inline from rect coords */
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }
        .treemap-group-label-inner {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 10px;
            font-weight: 800;
            color: #0f172a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 95%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            letter-spacing: -0.01em;
        }

        /* ── Hint bar at bottom ── */
        .treemap-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid #e2e8f0;
            border-radius: 9999px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            white-space: nowrap;
        }

        /* ── Empty State ── */
        .treemap-empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            font-size: 15px;
            font-weight: 600;
            gap: 12px;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="text-slate-800 flex flex-col h-full selection:bg-brand-100 selection:text-brand-900 font-sans bg-gray-50">
    <div id="flash" role="status" aria-live="polite"></div>

    <main class="flex-1 relative bg-gray-50 overflow-visible md:overflow-hidden">
        <div id="loadingScreen" class="absolute inset-0 bg-gray-50 z-[60] flex flex-col items-center justify-center transition-opacity duration-500 fixed md:absolute">
            <div class="w-8 h-8 border-2 border-gray-200 border-t-brand-600 rounded-full animate-spin mb-4"></div>
            <span class="text-sm font-medium text-slate-500 animate-pulse" data-i18n="optimizing">Optimizing Layout...</span>
        </div>
        <div id="signinGate" class="absolute inset-0 bg-gray-50/90 backdrop-blur-sm z-[55] flex items-center justify-center fixed md:absolute" style="display:none;">
            <div class="bg-white rounded-2xl shadow-xl border border-gray-200 p-8 max-w-md text-center mx-4">
                <div class="w-12 h-12 bg-brand-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="lock" class="w-6 h-6 text-brand-600"></i></div>
                <h2 class="font-display font-bold text-2xl text-slate-900 mb-2" data-i18n="pageTitle">Member Network</h2>
                <p class="text-slate-500 mb-6 text-sm" data-i18n="signinPrompt">Sign in to visualize connections.</p>
                <a href="signin.html" class="inline-flex items-center justify-center px-6 py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-lg transition-colors w-full" data-i18n="signinBtn">Sign In</a>
            </div>
        </div>

        <div class="max-w-[1800px] mx-auto w-full h-auto md:h-full flex flex-col md:flex-row gap-4 p-4 md:p-6 relative">
            <!-- Sidebar -->
            <aside class="flex-none w-full md:w-80 bg-white border border-gray-200 rounded-2xl flex flex-col shadow-sm overflow-hidden h-auto md:h-full shrink-0">
                <div class="p-5 border-b border-gray-100 space-y-4">
                    <h2 class="font-display font-bold text-lg text-brand-700 flex items-center gap-2">
                        <i data-lucide="share-2" class="w-5 h-5"></i>
                        <span data-i18n="explore">Explore Network</span>
                    </h2>
                    <div class="relative z-30">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="searchInput" class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-100 outline-none" placeholder="Search people, orgs..." data-i18n-placeholder="searchPlaceholder">
                    </div>
                    <div class="grid grid-cols-1 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 block" data-i18n="groupBy">Group Nodes By</label>
                            <div class="relative">
                                <select id="groupByFilter" class="w-full appearance-none bg-slate-50 border border-gray-200 text-slate-700 text-xs font-bold rounded-lg pl-3 pr-8 py-2.5 focus:ring-2 focus:ring-brand-100 outline-none">
                                    <option value="affiliation" data-i18n="optOrg">Organization</option>
                                    <option value="country" data-i18n="optCountry">Country</option>
                                </select>
                                <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400 pointer-events-none"></i>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="relative">
                                <select id="eventFilter" class="w-full appearance-none bg-white border border-gray-200 text-slate-700 text-xs font-medium rounded-lg pl-3 pr-8 py-2 focus:ring-2 focus:ring-brand-100 outline-none">
                                    <option value="all" data-i18n="allEvents">All Events</option>
                                </select>
                                <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400 pointer-events-none"></i>
                            </div>
                            <div class="relative">
                                <select id="countryFilter" class="w-full appearance-none bg-white border border-gray-200 text-slate-700 text-xs font-medium rounded-lg pl-3 pr-8 py-2 focus:ring-2 focus:ring-brand-100 outline-none">
                                    <option value="all" data-i18n="allCountries">All Countries</option>
                                </select>
                                <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 pt-1">
                        <button class="px-3 py-1 text-[11px] font-bold rounded-full transition-all shadow-sm bg-slate-800 text-white" data-role="all" data-i18n="roleAll">All Roles</button>
                        <button class="px-3 py-1 text-[11px] font-bold rounded-full transition-all border border-gray-200 text-slate-500 hover:bg-gray-50" data-role="speakers" data-i18n="roleSpeakers">Speakers</button>
                        <button class="px-3 py-1 text-[11px] font-bold rounded-full transition-all border border-gray-200 text-slate-500 hover:bg-gray-50" data-role="organizers" data-i18n="roleHosts">Hosts</button>
                    </div>
                </div>

    <script type="module">

        import { initSharedUI, renderHeader, applyI18n, tr, $, $$, show, hide, getAvatarUrl } from './ui.js';
        import { openProfileModal } from './clickprofile.js';

        renderLayout('network');

        /* ─────────────────────────────────────────────
           TRANSLATIONS
        ───────────────────────────────────────────── */
        const t = {
            en: {
                auth: { signin: "Sign in", signout: "Sign out" },
                nav:  { schedule: "Schedule", archive: "Archive", about: "About", network: "Network", map: "Map", admin: "Admin" },

                allEvents: "All Events", allCountries: "All Countries",
                roleAll: "All Roles", roleSpeakers: "Speakers", roleHosts: "Hosts",
                interests: "Interests & Tags", clear: "Clear",
                statMembers: "Members", statConnections: "Connections", statOrgs: "Orgs", statEvents: "Events",
