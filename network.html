                nav:  { schedule: "Programa", archive: "Archivo", about: "Acerca de", network: "Red", map: "Mapa", admin: "Admin" },
                pageTitle: "Red de Miembros", optimizing: "Optimizando Diseño...", signinPrompt: "Inicia sesión para visualizar conexiones.",
                signinBtn: "Ingresar", explore: "Explorar Red", searchPlaceholder: "Buscar personas, orgs...",
                groupBy: "Agrupar Nodos Por", optOrg: "Organización", optCountry: "País",
                allEvents: "Todos los Eventos", allCountries: "Todos los Países",
                roleAll: "Todos", roleSpeakers: "Ponentes", roleHosts: "Organizadores",
                interests: "Intereses y Etiquetas", clear: "Limpiar",
                statMembers: "Miembros", statConnections: "Conexiones", statOrgs: "Orgs", statEvents: "Eventos",
                switchNet: "Cambiar a Treemap", switchBub: "Cambiar a Burbujas",
                hoverMagnify: "Hover para Ampliar", resetView: "Reiniciar Vista",
                tblName: "Nombre", tblAff: "Afiliación / Institución", tblInterests: "Intereses",
                tblRole: "Rol", tblCountry: "País", tblConn: "Conexiones",
                legendMember: "Miembro", legendOrg: "Organización", legendAff: "Afiliación / Grupo",
                legendCollab: "Colaborador", legendTrack: "Arrastrar pista vertical",
                treemapBack: "Vista General", treemapClickDrill: "Haz clic en un grupo para explorar", treemapMembers: "miembros"
            }
        };

        /* ─────────────────────────────────────────────
           STATE
        ───────────────────────────────────────────── */
        const state = {
            members: [], profileById: new Map(), isSpeaker: new Set(), speakersByProfileId: new Map(),
            eventsById: new Map(), orgIndex: new Map(), tagIndex: new Map(), tagCounts: new Map(),
            allCanonicalToDisplay: new Map(), connections: [], nodes: new Map(), cachedNodes: [],
            positions: new Map(), panOffset: { x: 0, y: 0 }, zoom: 1,
            sort: { key: "connections", dir: "desc" },
            roleFilter: "all", eventFilterId: "all", countryFilterId: "all", groupBy: "affiliation",
            searchQuery: "", selectedTags: new Set(), lang: localStorage.getItem("lang") || "en",
            isDragging: false, viewMode: 'bubble',
            treemapDrilledGroup: null,
            /* Cached container dimensions — updated via ResizeObserver only */
            tmW: 0, tmH: 0,
            countries: {
                "US":"United States","MX":"Mexico","CA":"Canada","CO":"Colombia","BR":"Brazil",
                "CL":"Chile","AR":"Argentina","PE":"Peru","ES":"Spain","FR":"France","DE":"Germany",
                "BE":"Belgium","NL":"Netherlands","IT":"Italy","UK":"UK","GB":"UK",
                "IN":"India","CN":"China","AU":"Australia"
            }
        };

        /* ─────────────────────────────────────────────
           UTILITIES
        ───────────────────────────────────────────── */
        const clamp    = (v, a, b) => Math.max(a, Math.min(b, v));
        const debounce = (fn, ms = 200) => { let id = null; return (...a) => { clearTimeout(id); id = setTimeout(() => fn(...a), ms); }; };

        const highlight = (text, q) =>
            q && text
                ? (text + "").replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "ig"),
                    '<span class="bg-yellow-100 text-yellow-800 px-0.5 rounded">$1</span>')
                : (text || "");

        /* Stable hue from string — deterministic, no collisions at small N */
        const _hueCache = new Map();
        function stringToHue(str) {
            if (_hueCache.has(str)) return _hueCache.get(str);
            let h = 0; for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
            const hue = h % 360; _hueCache.set(str, hue); return hue;
        }
        const stringToColor     = s => `hsl(${stringToHue(s)}, 60%, 72%)`;
        const stringToColorDark = s => `hsl(${stringToHue(s)}, 55%, 42%)`;
        const stringToColorMid  = s => `hsl(${stringToHue(s)}, 58%, 58%)`;

        /* ─────────────────────────────────────────────
           SQUARIFIED TREEMAP — NaN / zero-safe version
        ───────────────────────────────────────────── */
        function squarify(items, x, y, w, h) {
            if (!items.length || w < 1 || h < 1) return [];
            const total = items.reduce((s, it) => s + (it.value || 0), 0);
            if (total <= 0) return [];

            const rects    = [];
            const scaled   = items.map(it => ({ ...it, area: ((it.value || 0) / total) * w * h }));
            let remaining  = scaled.slice();
            let cx = x, cy = y, cw = w, ch = h;

            function worst(row, sideLen) {
                if (!row.length || sideLen <= 0) return Infinity;
                const s  = row.reduce((a, r) => a + r.area, 0);
                if (s <= 0) return Infinity;
                const s2   = s * s;
                const sl2  = sideLen * sideLen;
                let maxA   = -Infinity, minA = Infinity;
                for (const r of row) {
                    if (r.area > maxA) maxA = r.area;
                    if (r.area < minA) minA = r.area;
                }
                if (minA <= 0) return Infinity;
                return Math.max((sl2 * maxA) / s2, s2 / (sl2 * minA));
            }

            function layoutRow(row, sideLen, vertical) {
                const totalArea = row.reduce((a, r) => a + r.area, 0);
                if (sideLen <= 0 || totalArea <= 0) return;
                const thickness = totalArea / sideLen;
                if (!Number.isFinite(thickness) || thickness <= 0) return;
                let offset = 0;
                for (const r of row) {
                    const len = r.area / thickness;
                    if (!Number.isFinite(len) || len <= 0) { offset += 0; continue; }
                    if (vertical) {
                        rects.push({ ...r, rx: cx, ry: cy + offset, rw: thickness, rh: len });
                    } else {
                        rects.push({ ...r, rx: cx + offset, ry: cy, rw: len, rh: thickness });
                    }
                    offset += len;
                }
                if (vertical) { cx += thickness; cw -= thickness; }
                else          { cy += thickness; ch -= thickness; }
            }

            while (remaining.length > 0 && cw >= 0.5 && ch >= 0.5) {
                const vertical  = ch <= cw;
                const sideLen   = vertical ? ch : cw;
                if (sideLen <= 0) break;

                let row         = [remaining[0]];
                let restIdx     = 1;
                let curWorst    = worst(row, sideLen);

                while (restIdx < remaining.length) {
                    const trial      = [...row, remaining[restIdx]];
                    const trialWorst = worst(trial, sideLen);
                    if (trialWorst <= curWorst) {
                        row      = trial;
                        curWorst = trialWorst;
                        restIdx++;
                    } else {
                        break;
                    }
                }
                layoutRow(row, sideLen, vertical);
                remaining = remaining.slice(restIdx);
            }
            return rects;
        }

        /* ─────────────────────────────────────────────
           TREEMAP — PENDING RENDER GATE
           Prevents concurrent renders from tearing
        ───────────────────────────────────────────── */
        let _tmRenderPending = false;
        let _tmRenderGeneration = 0; // monotonically increasing; stale renders self-cancel

        function scheduleTreemapRender(members) {
            _tmRenderGeneration++;
            const gen = _tmRenderGeneration;
            if (_tmRenderPending) return; // already queued
            _tmRenderPending = true;
            requestAnimationFrame(() => {
                _tmRenderPending = false;
                // only execute the latest request
                if (gen === _tmRenderGeneration) _doRenderTreemap(members);
            });
        }

        /* ─────────────────────────────────────────────
           TREEMAP — MAIN RENDER (off-DOM, then swap)
        ───────────────────────────────────────────── */
        function _doRenderTreemap(members) {
            const tilesLayer  = document.getElementById('treemapTilesLayer');
            const labelsLayer = document.getElementById('treemapLabelsLayer');
            if (!tilesLayer || !labelsLayer) return;

            /* Use cached dimensions — set by ResizeObserver */
            const W = state.tmW;
            const H = state.tmH;
            if (W < 10 || H < 10) return;

            const l = t[state.lang] || t.en;

            /* Build group map */
            const byGroup = new Map();
            members.forEach(m => {
                const key = state.groupBy === 'country'
                    ? (m.country ? (state.countries[m.country] || m.country) : "Unknown")
                    : (m.affiliation ? m.affiliation.trim() : null);
                if (!key) return;
                if (!byGroup.has(key)) byGroup.set(key, []);
                byGroup.get(key).push(m);
            });

            const groups = Array.from(byGroup.entries())
                .map(([name, list]) => ({ name, list, value: list.length }))
                .sort((a, b) => b.value - a.value);

            /* Build both layers off-DOM */
            const tilesFragment  = document.createDocumentFragment();
            const labelsFragment = document.createDocumentFragment();

            if (groups.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'treemap-empty-state';
                empty.innerHTML = `<i data-lucide="users" class="w-10 h-10"></i><span>No members match filters</span>`;
                tilesFragment.appendChild(empty);
            } else if (state.treemapDrilledGroup) {
                const group = groups.find(g => g.name === state.treemapDrilledGroup);
                if (group) {
                    _buildDrillDown(group, W, H, tilesFragment, labelsFragment, l);
                } else {
                    state.treemapDrilledGroup = null;
                    _buildOverview(groups, W, H, tilesFragment, labelsFragment, l);
                }
            } else {
                _buildOverview(groups, W, H, tilesFragment, labelsFragment, l);
            }

            /* Atomic swap — single reflow */
            tilesLayer.textContent  = '';
            labelsLayer.textContent = '';
            tilesLayer.appendChild(tilesFragment);
            labelsLayer.appendChild(labelsFragment);

            /* Trigger pop animations on the NEXT frame so browser has painted */
            requestAnimationFrame(() => {
                tilesLayer.querySelectorAll('.treemap-group-tile, .treemap-member-tile').forEach(el => {
                    el.classList.add('tm-animate');
                });
                if (window.lucide) window.lucide.createIcons();
            });
        }

        /* Alias for external callers */
        function renderTreemap(members) {
            scheduleTreemapRender(members);
        }

        /* ─────────────────────────────────────────────
           TREEMAP — OVERVIEW
        ───────────────────────────────────────────── */
        function _buildOverview(groups, W, H, tilesFragment, labelsFragment, l) {
            const PAD      = 5;
            const groupRects = squarify(
                groups, PAD, PAD,
                W - PAD * 2, H - PAD * 2
            );

            /* Hint label in labels layer */
            const hint = document.createElement('div');
            hint.className = 'treemap-hint';
            hint.innerHTML = `<i data-lucide="mouse-pointer-click" class="w-3.5 h-3.5 text-brand-500"></i> <span>${l.treemapClickDrill || 'Click a group to explore'}</span>`;
            labelsFragment.appendChild(hint);

            groupRects.forEach((rect, index) => {
                /* ── Tile ── */
                const tile      = document.createElement('div');
                tile.className  = 'treemap-group-tile';
                tile.style.cssText = [
                    `left:${rect.rx}px`,
                    `top:${rect.ry}px`,
                    `width:${rect.rw}px`,
                    `height:${rect.rh}px`,
                    `background-color:${stringToColor(rect.name)}`,
                    `--tm-delay:${(index * 0.012).toFixed(3)}s`
                ].join(';');

                const isTiny  = rect.rw < 52 || rect.rh < 40;
                const isSmall = rect.rw < 110 || rect.rh < 72;

                /* Header height */
                const headerH = isTiny ? 0 : (isSmall ? 24 : 30);

                if (!isTiny) {
                    const header         = document.createElement('div');
                    header.className     = 'treemap-group-header';
                    header.style.cssText = `--header-h:${headerH}px`;

                    const nameSpan       = document.createElement('span');
                    nameSpan.className   = 'treemap-group-header-name';
                    nameSpan.textContent = rect.name;
                    if (isSmall) nameSpan.style.fontSize = '9px';

                    const countSpan       = document.createElement('span');
                    countSpan.className   = 'treemap-group-header-count';
                    countSpan.textContent = rect.list.length;
                    if (isSmall) { countSpan.style.fontSize = '8px'; countSpan.style.padding = '1px 5px'; }

                    header.appendChild(nameSpan);
                    header.appendChild(countSpan);
                    tile.appendChild(header);
                }

                /* Members area — offset precisely below header */
                const membersArea         = document.createElement('div');
                membersArea.className     = 'treemap-members-area';
                membersArea.style.top     = `${headerH}px`;
                tile.appendChild(membersArea);

                /* Render member sub-tiles */
                const innerW = rect.rw;
                const innerH = rect.rh - headerH;
                if (!isTiny && innerW > 8 && innerH > 8) {
                    const maxShow    = Math.min(rect.list.length, 40);
                    const mItems     = rect.list.slice(0, maxShow).map(m => ({ member: m, value: 1 }));
                    const mRects     = squarify(mItems, 0, 0, innerW, innerH);

                    mRects.forEach((mr, mIdx) => {
                        const mtile      = document.createElement('div');
                        mtile.className  = 'treemap-member-tile';
                        mtile.style.cssText = [
                            `left:${mr.rx}px`,
                            `top:${mr.ry}px`,
                            `width:${mr.rw}px`,
                            `height:${mr.rh}px`,
                            `background-color:${stringToColorDark(mr.member.full_name || 'M')}`,
                            `--tm-delay:${((index * 0.01) + (mIdx * 0.004)).toFixed(3)}s`
                        ].join(';');

                        _buildMemberTileContent(mtile, mr.member, mr.rw, mr.rh, false);

                        mtile.onclick = e => { e.stopPropagation(); openProfileModal(mr.member); };
                        membersArea.appendChild(mtile);
                    });

                    if (rect.list.length > maxShow) {
                        const more        = document.createElement('div');
                        more.style.cssText = 'position:absolute;bottom:4px;right:6px;font-size:10px;font-weight:800;color:rgba(255,255,255,0.9);text-shadow:0 1px 3px rgba(0,0,0,0.7);pointer-events:none;z-index:40;';
                        more.textContent   = `+${rect.list.length - maxShow}`;
                        membersArea.appendChild(more);
                    }
                }

                /* Click to drill */
                tile.onclick = () => {
                    state.treemapDrilledGroup = rect.name;
                    scheduleTreemapRender(getFiltered());
                };
                tile.title = `${rect.name} — ${rect.list.length} ${l.treemapMembers || 'members'}`;
                tilesFragment.appendChild(tile);

                /* ── Group label in LABELS LAYER (never overlaps tile content) ── */
                /* Only render label if tile is wide enough to show it */
                if (!isTiny && rect.rw > 60 && rect.rh > 50) {
                    const labelWrap         = document.createElement('div');
                    labelWrap.className     = 'treemap-group-label';
                    /* Position label at the TOP of the tile's header zone */
                    labelWrap.style.cssText = [
                        `left:${rect.rx}px`,
                        `top:${rect.ry}px`,
                        `width:${rect.rw}px`,
                        `height:${headerH || 1}px`,
                        'pointer-events:none'
                    ].join(';');
                    /* Label is ONLY used when the tile is too small for the inline header */
                    /* For tiles with headers, the label layer is not added to avoid duplication */
                    /* We skip adding it — header is already inside the tile */
                    /* Label layer is reserved for collision-free floating labels (future use) */
                    /* This block intentionally left as a hook for bubble-overflow labels */
                    labelsFragment.appendChild(labelWrap);
                }
            });
        }

        /* ─────────────────────────────────────────────
           TREEMAP — DRILL-DOWN
        ───────────────────────────────────────────── */
        function _buildDrillDown(group, W, H, tilesFragment, labelsFragment, l) {
            /* Breadcrumb in labels layer so it's always on top */
            const breadcrumb     = document.createElement('div');
            breadcrumb.className = 'treemap-breadcrumb';

            const backBtn       = document.createElement('button');
            backBtn.className   = 'treemap-breadcrumb-btn';
            backBtn.innerHTML   = `<i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> ${l.treemapBack || 'Overview'}`;
            backBtn.onclick     = () => {
                state.treemapDrilledGroup = null;
                scheduleTreemapRender(getFiltered());
            };
            breadcrumb.appendChild(backBtn);

            const groupLbl           = document.createElement('span');
            groupLbl.className       = 'treemap-breadcrumb-btn';
            groupLbl.style.cssText   = `cursor:default;background:${stringToColor(group.name)};border-color:rgba(255,255,255,0.5);color:#0f172a;`;
            groupLbl.textContent     = `${group.name} (${group.list.length})`;
            breadcrumb.appendChild(groupLbl);
            labelsFragment.appendChild(breadcrumb);

            /* Layout constants */
            const BREADCRUMB_H = 52; // px reserved at top for breadcrumb
            const PAD          = 8;

            const areaX = PAD;
            const areaY = BREADCRUMB_H;
            const areaW = W - PAD * 2;
            const areaH = H - BREADCRUMB_H - PAD;

            if (areaW < 4 || areaH < 4) return;

            /* Sort by connection count descending for prominence */
            const sorted = [...group.list].sort((a, b) => {
                const ca = state.connections.filter(c => c.source === a.id || c.target === a.id).length;
                const cb = state.connections.filter(c => c.source === b.id || c.target === b.id).length;
                return cb - ca;
            });

            const mItems  = sorted.map(m => ({ member: m, value: 1 }));
            const mRects  = squarify(mItems, areaX, areaY, areaW, areaH);

            /* Inner gap between tiles */
            const GAP = 3;

            mRects.forEach((mr, index) => {
                const mtile      = document.createElement('div');
                mtile.className  = 'treemap-member-tile';
                mtile.style.cssText = [
                    `left:${mr.rx + GAP}px`,
                    `top:${mr.ry + GAP}px`,
                    `width:${Math.max(0, mr.rw - GAP * 2)}px`,
                    `height:${Math.max(0, mr.rh - GAP * 2)}px`,
                    `background-color:${stringToColorDark(mr.member.full_name || 'M')}`,
                    `border-radius:10px`,
                    `border:2px solid rgba(255,255,255,0.85)`,
                    `--tm-delay:${(index * 0.018).toFixed(3)}s`
                ].join(';');

                const tileW = Math.max(0, mr.rw - GAP * 2);
                const tileH = Math.max(0, mr.rh - GAP * 2);

                _buildMemberTileContent(mtile, mr.member, tileW, tileH, true);

                /* Connection badge */
                const connCount = state.connections.filter(c => c.source === mr.member.id || c.target === mr.member.id).length;
                if (connCount > 0 && tileW > 55 && tileH > 45) {
                    const badge           = document.createElement('div');
                    badge.className       = 'treemap-badge';
                    badge.style.cssText   = 'top:7px;right:7px;';
                    badge.innerHTML       = `<i data-lucide="link" class="w-2.5 h-2.5"></i> ${connCount}`;
                    mtile.appendChild(badge);
                }

                /* Speaker badge */
                if (state.isSpeaker.has(mr.member.id) && tileW > 55 && tileH > 45) {
                    const spkBadge          = document.createElement('div');
                    spkBadge.className      = 'treemap-badge treemap-badge-speaker';
                    spkBadge.style.cssText  = 'top:7px;left:7px;padding:2px 5px;';
                    spkBadge.innerHTML      = `<i data-lucide="mic" class="w-2.5 h-2.5"></i>`;
                    mtile.appendChild(spkBadge);
                }

                mtile.onclick = e => { e.stopPropagation(); openProfileModal(mr.member); };
                tilesFragment.appendChild(mtile);
            });
        }

        /* ─────────────────────────────────────────────
           TREEMAP — SMART MEMBER TILE CONTENT
           All sizing done via pixel math, no reflows
        ───────────────────────────────────────────── */
        function _buildMemberTileContent(mtile, member, w, h, isDrilldown) {
            const name          = member.full_name || 'Member';
            const initialsText  = name.split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase();
            const minDim        = Math.min(w, h);
            const isTiny        = w < 38 || h < 38;

            if (isTiny) {
                /* Minimal: just avatar or single initial */
                if (member.avatar_url) {
                    const img       = document.createElement('img');
                    img.className   = 'treemap-member-avatar-full';
                    img.loading     = 'lazy';
                    img.alt         = name;
                    img.decoding    = 'async';
                    img.src         = member.avatar_url;
                    mtile.appendChild(img);
                } else {
                    const init         = document.createElement('span');
                    init.className     = 'treemap-member-initials-full';
                    init.style.fontSize = `${clamp(minDim * 0.38, 10, 20)}px`;
                    init.textContent   = initialsText[0] || '?';
                    mtile.appendChild(init);
                }
                /* Always add tooltip for accessibility even on tiny tiles */
                _appendTooltip(mtile, member, w, h);
                return;
            }

            const isWide = w > h * 1.6;
            const isTall = h > w * 1.6;

            /* Ambient background */
            if (member.avatar_url) {
                const bg          = document.createElement('div');
                bg.className      = 'treemap-ambient-bg';
                bg.style.backgroundImage = `url(${member.avatar_url})`;
                mtile.appendChild(bg);
            }

            /* Smart wrapper */
            const wrapper        = document.createElement('div');
            wrapper.className    = 'treemap-smart-wrapper';

            /* Cap avatar size to avoid enormous circles on large tiles */
            const avatarCap  = isDrilldown ? 140 : 72;
            const avatarSize = clamp(minDim * 0.65, 20, avatarCap);

            /* Layout direction */
            const showRow = isWide && w > 130;
            wrapper.style.cssText = [
                `flex-direction:${showRow ? 'row' : 'column'}`,
                `justify-content:${showRow ? 'flex-start' : 'center'}`,
                `padding:${showRow ? `0 ${Math.round(w * 0.1)}px` : `${Math.round(h * 0.06)}px ${Math.round(w * 0.08)}px`}`,
                `gap:${showRow ? '10px' : '6px'}`
            ].join(';');

            /* Avatar or initials circle */
            if (member.avatar_url) {
                const img        = document.createElement('img');
                img.className    = 'treemap-smart-avatar';
                img.loading      = 'lazy';
                img.decoding     = 'async';
                img.alt          = name;
                img.src          = member.avatar_url;
                img.style.cssText = `width:${avatarSize}px;height:${avatarSize}px;`;
                wrapper.appendChild(img);
            } else {
                const initBox        = document.createElement('div');
                initBox.className    = 'treemap-smart-initials';
                initBox.style.cssText = `width:${avatarSize}px;height:${avatarSize}px;font-size:${Math.round(avatarSize * 0.38)}px;`;
                initBox.textContent  = initialsText;
                wrapper.appendChild(initBox);
            }

            /* Text block */
            const showText = isDrilldown
                ? (w > 90 && h > 80)
                : (showRow ? w > 150 : (w > 85 && h > 85));

            if (showText) {
                const textBox        = document.createElement('div');
                textBox.className    = 'treemap-smart-text';
                textBox.style.cssText = `align-items:${showRow ? 'flex-start' : 'center'};text-align:${showRow ? 'left' : 'center'};max-width:${showRow ? `${w - avatarSize - 40}px` : '90%'};`;

                const nameEl        = document.createElement('div');
                nameEl.className    = 'treemap-smart-name';
                nameEl.style.fontSize = `${clamp(minDim * 0.13, isDrilldown ? 13 : 11, isDrilldown ? 20 : 15)}px`;
                nameEl.textContent  = name;
                textBox.appendChild(nameEl);

                if (member.role && (w > 150 || h > 150)) {
                    const roleEl        = document.createElement('div');
                    roleEl.className    = 'treemap-smart-role';
                    roleEl.style.fontSize = `${clamp(minDim * 0.09, 9, isDrilldown ? 13 : 11)}px`;
                    roleEl.textContent  = member.role.charAt(0).toUpperCase() + member.role.slice(1);
                    textBox.appendChild(roleEl);
                }
                wrapper.appendChild(textBox);
            }
            mtile.appendChild(wrapper);

            /* Hover tooltip — rendered INSIDE the tile (not the labels layer)
               so it clips with overflow:hidden and never escapes tile bounds */
            _appendTooltip(mtile, member, w, h);

            /* Async hi-res avatar replacement */
            if (member.avatar_url && !member.avatar_url.startsWith('http')) {
                getAvatarUrl(member.avatar_url).then(u => {
                    if (!u) return;
                    mtile.querySelectorAll('img').forEach(i => { i.src = u; });
                    mtile.querySelectorAll('.treemap-ambient-bg').forEach(b => { b.style.backgroundImage = `url(${u})`; });
                });
            }
        }

        /* Hover tooltip — always appended last so z-index stacks correctly */
        function _appendTooltip(mtile, member, w, h) {
            const tooltip       = document.createElement('div');
            tooltip.className   = 'treemap-member-tooltip';

            const tName         = document.createElement('div');
            tName.className     = 'treemap-member-tooltip-name';
            tName.textContent   = member.full_name || 'Member';
            tooltip.appendChild(tName);

            if (h > 52 && member.affiliation) {
                const tAff        = document.createElement('div');
                tAff.className    = 'treemap-member-tooltip-aff';
                tAff.textContent  = member.affiliation;
                tooltip.appendChild(tAff);
            }
            mtile.appendChild(tooltip);
        }

        /* ─────────────────────────────────────────────
           RESIZE OBSERVER — stable dimension cache
        ───────────────────────────────────────────── */
        let _roRafId = null;
        const _treemapRO = new ResizeObserver(entries => {
            for (const entry of entries) {
                const { width, height } = entry.contentRect;
                state.tmW = Math.floor(width);
                state.tmH = Math.floor(height);
            }
            /* Debounce re-render to next frame */
            if (_roRafId) return;
            _roRafId = requestAnimationFrame(() => {
                _roRafId = null;
                if (state.viewMode === 'network') scheduleTreemapRender(getFiltered());
            });
        });

        /* ─────────────────────────────────────────────
           TRANSLATIONS
        ───────────────────────────────────────────── */
        function applyLocalTranslations() {
            const l = t[state.lang] || t.en;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n; if (l[key]) el.innerText = l[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.dataset.i18nPlaceholder; if (l[key]) el.placeholder = l[key];
            });
            const btnLabel = document.getElementById('viewModeText');
            if (btnLabel) btnLabel.innerText = state.viewMode === 'network' ? l.switchBub : l.switchNet;
            applyI18n(t, state.lang);
            populateDropdowns();
            const list = getFiltered();
            renderTable(list);
            if (list.length > 0) renderGraph(list);
        }

        function populateDropdowns() {
            const l  = t[state.lang] || t.en;
            const es = $('#eventFilter'), cs = $('#countryFilter');
            const ce = es.value, cc = cs.value;

            es.innerHTML = `<option value="all">${l.allEvents}</option>`;
            state.eventsById.forEach(e =>
                es.add(new Option(
                    new Date(e.start_time).toLocaleDateString() + ' - ' +
                    (state.lang === 'es' ? (e.title_es || e.title_en) : e.title_en),
                    e.id
                ))
            );
            es.value = ce;

            cs.innerHTML = `<option value="all">${l.allCountries}</option>`;
            const uc = new Set(state.members.map(m => m.country).filter(Boolean));
            Array.from(uc).sort().forEach(c =>
                cs.add(new Option(`${state.countries[c] || c} (${c})`, c))
            );
            cs.value = cc;
        }

        /* ─────────────────────────────────────────────
           DATA LOADING
        ───────────────────────────────────────────── */
        async function loadNetworkData() {
            const [profiles, speakers, events] = await Promise.all([
                supabase.from('profiles').select(
                    'id,full_name,username,avatar_url,affiliation,fields_of_study,country,role,collaborators,department,working_group,personal_website,professional_website,google_scholar,description,work_email'
                ).order('full_name'),
                supabase.from('event_speakers').select('event_id,profile_id'),
                supabase.from('events').select('id,title_en,title_es,start_time,topic_tags').order('start_time', { ascending: false })
            ]);

            state.members = profiles.data || [];
            (events.data  || []).forEach(e => state.eventsById.set(e.id, e));
            (speakers.data || []).forEach(s => {
                if (!s.profile_id) return;
                state.isSpeaker.add(s.profile_id);
                if (!state.speakersByProfileId.has(s.profile_id)) state.speakersByProfileId.set(s.profile_id, new Set());
                state.speakersByProfileId.get(s.profile_id).add(s.event_id);
            });

            const processedConns = new Set(), conns = [];
            state.members.forEach(m => {
                state.profileById.set(m.id, m);

                const org = m.affiliation?.trim();
                if (org) {
                    if (!state.orgIndex.has(org)) state.orgIndex.set(org, new Set());
                    state.orgIndex.get(org).add(m.id);
                }

                const rawTags = (m.fields_of_study || "").split(",").map(s => s.trim()).filter(Boolean);
                if (state.speakersByProfileId.has(m.id)) {
                    state.speakersByProfileId.get(m.id).forEach(eid => {
                        const ev = state.eventsById.get(eid);
                        if (ev?.topic_tags) rawTags.push(...ev.topic_tags);
                    });
                }
                new Set(rawTags.map(tg => tg.toLowerCase())).forEach(u => {
                    const display = rawTags.find(r => r.toLowerCase() === u) || u;
                    if (!state.tagIndex.has(u))  state.tagIndex.set(u, new Set());
                    state.tagIndex.get(u).add(m.id);
                    state.allCanonicalToDisplay.set(u, display);
                    state.tagCounts.set(u, (state.tagCounts.get(u) || 0) + 1);
                });

                if (m.collaborators?.length) {
                    m.collaborators.forEach(tid => {
                        const key = [m.id, tid].sort().join('-');
                        if (!processedConns.has(key) && state.members.some(x => x.id === tid)) {
                            conns.push({ source: m.id, target: tid, type: 'collab' });
                            processedConns.add(key);
                        }
                    });
                }
            });
            state.connections = conns;

            $('#statMembers').innerText    = state.members.length;
            $('#statConnections').innerText = conns.length + state.members.filter(m => m.affiliation).length;
            $('#statOrgs').innerText       = state.orgIndex.size;
            $('#statEvents').innerText     = state.eventsById.size;

            populateTagFilters();
            onFiltersChanged();
        }

        /* ─────────────────────────────────────────────
           TAG FILTERS
        ───────────────────────────────────────────── */
        function populateTagFilters() {
            const c = $('#tagFilters'); c.innerHTML = '';
            Array.from(state.tagCounts.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 50)
                .forEach(([tag, count]) => {
                    const isSel = state.selectedTags.has(tag);
                    const row   = document.createElement('div');
                    row.className = 'flex items-center justify-between px-2 py-1 hover:bg-gray-50 rounded cursor-pointer group';
                    row.innerHTML = `
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-sm border ${isSel ? 'bg-brand-500 border-brand-500' : 'border-gray-300'} flex items-center justify-center">
                                ${isSel ? '<svg width="8" height="8" viewBox="0 0 24 24" stroke="white" stroke-width="4" fill="none"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
                            </div>
                            <span class="text-xs text-slate-600">${state.allCanonicalToDisplay.get(tag)}</span>
                        </div>
                        <span class="text-[10px] text-slate-300 font-bold">${count}</span>`;
                    row.onclick = () => {
                        isSel ? state.selectedTags.delete(tag) : state.selectedTags.add(tag);
                        onFiltersChanged();
                    };
                    c.appendChild(row);
                });

            const selC = $('#selectedTagsContainer'); selC.innerHTML = '';
            state.selectedTags.forEach(tg =>
                selC.insertAdjacentHTML('beforeend',
                    `<span class="px-2 py-0.5 bg-brand-50 text-brand-700 border border-brand-100 rounded text-[10px] font-bold flex items-center gap-1">
                        ${state.allCanonicalToDisplay.get(tg)}
                        <button onclick="document.dispatchEvent(new CustomEvent('remTag',{detail:'${tg}'}))">×</button>
                    </span>`
                )
            );
        }
        document.addEventListener('remTag', e => { state.selectedTags.delete(e.detail); onFiltersChanged(); });

        /* ─────────────────────────────────────────────
           BUBBLE LAYOUT
        ───────────────────────────────────────────── */
        function calculatePositions(members) {
            const byGroup = new Map();
            members.forEach(m => {
                if (!m.affiliation || !m.affiliation.trim()) return;
                const key = state.groupBy === 'country'
                    ? (m.country ? (state.countries[m.country] || m.country) : "Unknown")
                    : m.affiliation.trim();
                if (!byGroup.has(key)) byGroup.set(key, []);
                byGroup.get(key).push(m);
            });

            const container   = $('#network-container');
            const aspectRatio = Math.max(1.8, (container.offsetWidth || 800) / (container.offsetHeight || 600));
            const clusters    = [];
            let totalCount    = 0;
            for (const [name, list] of byGroup.entries()) { totalCount += list.length; clusters.push({ name, list, count: list.length }); }
            clusters.sort((a, b) => b.count - a.count);

            const areaPerMember = (container.offsetWidth * container.offsetHeight * 0.95) / Math.max(totalCount, 1);
            const memberRadius  = Math.max(22, Math.min(32, Math.sqrt(areaPerMember / Math.PI) * 0.45));
            const packed        = clusters.map(c => ({
                ...c,
                radius: Math.max(70, Math.sqrt(c.count * Math.PI * (memberRadius + 12) ** 2 * 3.5 / Math.PI) * 1.1),
                x: 0, y: 0
            }));

            for (let i = 1; i < packed.length; i++) {
                const cur = packed[i];
                let bestDist = Infinity, bestX = 0, bestY = 0;
                for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 45) {
                    for (let dist = 0; dist < 4000; dist += 25) {
                        const tx = Math.cos(angle) * dist * aspectRatio;
                        const ty = Math.sin(angle) * dist;
                        let valid = true;
                        for (let j = 0; j < i; j++) {
                            const o = packed[j], minDist = cur.radius + o.radius + 60;
                            if ((tx - o.x) ** 2 + (ty - o.y) ** 2 < minDist ** 2) { valid = false; break; }
                        }
                        if (valid) {
                            const d = Math.sqrt((tx / aspectRatio) ** 2 + ty ** 2);
                            if (d < bestDist) { bestDist = d; bestX = tx; bestY = ty; }
                        }
                    }
                }
                cur.x = bestX; cur.y = bestY;
            }

            const pos = new Map();
            packed.forEach(c => {
                pos.set(`group-${c.name}`, { x: c.x, y: c.y, r: c.radius });
                if (c.list.length === 1) {
                    pos.set(c.list[0].id, { x: c.x, y: c.y });
                } else {
                    const ga = Math.PI * (3 - Math.sqrt(5)), maxR = c.radius - memberRadius - 20;
                    c.list.forEach((m, i) => {
                        const a = i * ga, r = maxR * Math.sqrt(i / c.count);
                        pos.set(m.id, { x: c.x + Math.cos(a) * r, y: c.y + Math.sin(a) * r });
                    });
                }
            });
            return { pos, clusters: packed, memberRadius };
        }

        /* ─────────────────────────────────────────────
           RENDER GRAPH (Bubble or Treemap dispatcher)
        ───────────────────────────────────────────── */
        function renderGraph(members) {
            const c           = $('#network-container');
            const svg         = $('#networkConnections');
            const nodesEl     = $('#networkNodes');
            const treemapRoot = $('#treemapRoot');
            if (!c.offsetWidth) return;

            const l = t[state.lang] || t.en;

            if (state.viewMode === 'network') {
                /* ── Treemap mode ── */
                svg.innerHTML  = '';
                nodesEl.innerHTML = '';
                $('#networkCanvas').style.display = 'none';
                treemapRoot.style.display = 'block';
                $('#hoverHint').style.display = 'none';

                /* Start observing treemap container for dimensions */
                _treemapRO.observe(treemapRoot);
                /* Seed dimensions immediately (first paint) */
                state.tmW = treemapRoot.offsetWidth  || c.offsetWidth;
                state.tmH = treemapRoot.offsetHeight || c.offsetHeight;

                $('#legendContainer').innerHTML = `
                    <div class="flex items-center gap-3 bg-white/90 backdrop-blur p-3 rounded-xl border border-gray-200 shadow-sm text-[11px] font-medium text-slate-600">
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded" style="background:${stringToColor('Sample')};border:1px solid rgba(0,0,0,0.1);"></div>
                            <span>${l.legendAff || 'Group'}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded" style="background:${stringToColorDark('Sample')};border:1px solid rgba(0,0,0,0.1);"></div>
                            <span>${l.legendMember || 'Member'}</span>
                        </div>
                    </div>`;

                scheduleTreemapRender(members);
                state.cachedNodes = [];
                return;
            }

            /* ── Bubble mode ── */
            _treemapRO.unobserve(treemapRoot);
            treemapRoot.style.display = 'none';
            /* Clear treemap layers cleanly */
            const tl = document.getElementById('treemapTilesLayer');
            const ll = document.getElementById('treemapLabelsLayer');
            if (tl) tl.textContent = '';
            if (ll) ll.textContent = '';

            $('#networkCanvas').style.display = '';
            $('#hoverHint').style.display = '';

            /* Cancel any pending visual RAF */
            if (visualRafId) { cancelAnimationFrame(visualRafId); visualRafId = null; }

            const layout = calculatePositions(members);
            state.positions = layout.pos;
            svg.innerHTML  = '';
            nodesEl.innerHTML = '';

            $('#legendContainer').innerHTML = `
                <div class="flex items-center gap-3 bg-white/90 backdrop-blur p-3 rounded-xl border border-gray-200 shadow-sm text-[11px] font-medium text-slate-600">
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded-full bg-gradient-to-br from-slate-200 to-slate-300 border-2 border-white shadow-sm"></div>
                        <span>${l.legendOrg}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded-full bg-white border-2 border-brand-400 shadow-sm"></div>
                        <span>${l.legendMember}</span>
                    </div>
                </div>`;

            const frag = document.createDocumentFragment();

            /* Group bubbles */
            layout.clusters.forEach(cluster => {
                const p = state.positions.get(`group-${cluster.name}`);
                if (!p) return;

                const el        = document.createElement('div');
                el.className    = 'network-node group-node bubble-group';
                el.dataset.x    = p.x; el.dataset.y = p.y; el.dataset.type = 'group';
                el.style.width  = el.style.height = `${p.r * 2}px`;
                el.style.backgroundColor = stringToColor(cluster.name);
                el.style.transform = `translate(-50%,-50%) translate(${p.x}px,${p.y}px) translateZ(0)`;
                el.onclick = e => {
                    e.stopPropagation();
                    $('#searchInput').value = cluster.name;
                    onFiltersChanged();
                };
                frag.appendChild(el);

                /* Group label — positioned above bubble, not overlapping members */
                const lbl       = document.createElement('div');
                lbl.className   = 'network-node pointer-events-none';
                /* Place label centred at top of bubble with a gap */
                const lblY      = p.y - p.r - 2; // 2px gap above bubble edge
                lbl.dataset.x   = p.x;
                lbl.dataset.y   = lblY;
                lbl.dataset.type = 'group-label';
                lbl.style.transform = `translate(-50%,-50%) translate(${p.x}px,${lblY}px) translateZ(0)`;
                lbl.style.zIndex = '30';
                /* Constrain label width to bubble diameter */
                const maxLblW   = Math.max(80, p.r * 2 - 16);
                lbl.innerHTML   = `
                    <div class="flex flex-col items-center">
                        <span class="px-4 py-1.5 bg-white/97 backdrop-blur shadow-lg border border-gray-200 rounded-full text-sm font-extrabold text-slate-900 ring-1 ring-black/5"
                              style="max-width:${maxLblW}px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">
                            ${cluster.name}
                        </span>
                    </div>`;
                frag.appendChild(lbl);
            });

            /* Member nodes */
            members.forEach(m => {
                const p = state.positions.get(m.id);
                if (!p) return;
                const size = (layout.memberRadius || 20) * 2;
                const el   = document.createElement('div');
                el.className = 'network-node member-node bubble-member group/bub';
                el.dataset.x = p.x; el.dataset.y = p.y;
                el.style.transform = `translate(-50%,-50%) translate(${p.x}px,${p.y}px) translateZ(0)`;
                el.innerHTML = `
                    <div class="rounded-full bg-white flex items-center justify-center shadow-md border-2 border-white overflow-hidden cursor-pointer relative"
                         style="width:${size}px;height:${size}px;">
                        ${m.avatar_url
                            ? `<img src="${m.avatar_url}" class="w-full h-full object-cover" loading="lazy" decoding="async" alt="${m.full_name || ''}">`
                            : `<span class="text-xs font-bold text-brand-600">${(m.full_name || 'M')[0]}</span>`}
                    </div>
                    <div class="absolute top-full mt-2 left-1/2 -translate-x-1/2 whitespace-nowrap bg-slate-900/90 backdrop-blur text-white text-[11px] py-1.5 px-3 rounded-lg opacity-0 group-hover/bub:opacity-100 pointer-events-none transition-opacity duration-200 z-[100] shadow-xl border border-white/10">
                        <div class="font-bold">${m.full_name || ''}</div>
                        ${m.affiliation ? `<div class="text-slate-300 text-[9px] font-medium">${m.affiliation}</div>` : ''}
                        <div class="absolute -top-1 left-1/2 -translate-x-1/2 border-l-4 border-r-4 border-b-4 border-l-transparent border-r-transparent border-b-slate-900/90"></div>
                    </div>`;
                if (m.avatar_url) {
                    getAvatarUrl(m.avatar_url).then(u => {
                        const img = el.querySelector('img');
                        if (img && u) img.src = u;
                    });
                }
                el.onclick = e => { e.stopPropagation(); openProfileModal(m); };
                frag.appendChild(el);
            });

            nodesEl.appendChild(frag);

            /* Cache for magnification loop */
            state.cachedNodes = Array.from(nodesEl.children).filter(n => n.classList.contains('network-node'));
            if (window.lucide) window.lucide.createIcons();
            fitGraph();
        }

        /* ─────────────────────────────────────────────
           FIT / PAN / ZOOM
        ───────────────────────────────────────────── */
        function fitGraph() {
            if (state.viewMode === 'network') return;
            const pts = Array.from(state.positions.values()).filter(p => Number.isFinite(p.x));
            if (!pts.length) return;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            pts.forEach(p => {
                const r = p.r || 0;
                minX = Math.min(minX, p.x - r); maxX = Math.max(maxX, p.x + r);
                minY = Math.min(minY, p.y - r); maxY = Math.max(maxY, p.y + r);
            });
            const padding   = 160;
            const cW        = $('#network-container').offsetWidth;
            const cH        = $('#network-container').offsetHeight;
            const scale     = Math.min(
                cW / (maxX - minX + padding),
                cH / (maxY - minY + padding),
                1.0
            );
            if (Number.isFinite(scale) && scale > 0) {
                state.zoom        = scale;
                state.panOffset.x = cW / 2 - ((minX + maxX) / 2) * scale;
                state.panOffset.y = cH / 2 - ((minY + maxY) / 2) * scale;
                updateTransform();
            }
        }

        function updateTransform() {
            if (state.viewMode === 'network') return;
            $('#networkCanvas').style.transform =
                `translate(${state.panOffset.x}px,${state.panOffset.y}px) scale(${state.zoom})`;
        }

        /* ─────────────────────────────────────────────
           MAGNIFICATION LOOP — bubble view only
           Uses RAF + early-exit to avoid stale frame
        ───────────────────────────────────────────── */
        let mousePos       = { x: 0, y: 0 };
        let visualRafId    = null;
        let transformRafId = null;
        let wheelRafId     = null;
        let pendingWheelScale = 1;

        function updateVisuals() {
            visualRafId = null; // clear before work so a new one can be scheduled
            if (state.isDragging || state.viewMode === 'network') return;

            const RADIUS    = 250;        // px in screen space
            const RADIUS_SQ = RADIUS * RADIUS;
            const MAX_SCALE = 2.0;
            let nearest     = null;
            let minDSq      = Infinity;

            for (let i = 0, len = state.cachedNodes.length; i < len; i++) {
                const node = state.cachedNodes[i];
                if (node.dataset.type === 'group' || node.dataset.type === 'group-label') continue;

                const wx  = parseFloat(node.dataset.x);
                const wy  = parseFloat(node.dataset.y);
                if (!Number.isFinite(wx) || !Number.isFinite(wy)) continue;

                /* Convert world → screen */
                const sx  = wx * state.zoom + state.panOffset.x;
                const sy  = wy * state.zoom + state.panOffset.y;
                const dx  = sx - mousePos.x;
                const dy  = sy - mousePos.y;
                const dSq = dx * dx + dy * dy;

                if (dSq < RADIUS_SQ) {
                    const factor  = 1 - (Math.sqrt(dSq) / RADIUS);
                    const sc      = 1 + factor * factor * (MAX_SCALE - 1);
                    if (!node.classList.contains('is-interacting')) node.classList.add('is-interacting');
                    node.style.transform = `translate(-50%,-50%) translate(${wx}px,${wy}px) scale(${sc}) translateZ(0)`;
                    if (dSq < minDSq) { minDSq = dSq; nearest = node; }
                } else if (node.classList.contains('is-interacting')) {
                    node.style.transform = `translate(-50%,-50%) translate(${wx}px,${wy}px) translateZ(0)`;
                    node.classList.remove('is-interacting', 'magnified');
                }

                if (node !== nearest) node.classList.remove('magnified');
            }
            if (nearest && minDSq < 10000) nearest.classList.add('magnified');
        }

        function resetMagnification() {
            if (visualRafId) { cancelAnimationFrame(visualRafId); visualRafId = null; }
            state.cachedNodes.forEach(node => {
                if (node.dataset.type === 'group' || node.dataset.type === 'group-label') return;
                const wx = node.dataset.x, wy = node.dataset.y;
                node.style.transform = `translate(-50%,-50%) translate(${wx}px,${wy}px) translateZ(0)`;
                node.classList.remove('magnified', 'is-interacting');
            });
        }

        /* ─────────────────────────────────────────────
           FILTER / SORT
        ───────────────────────────────────────────── */
        function getFiltered() {
            let res = state.members;
            if (state.roleFilter !== 'all') {
                res = res.filter(m => state.roleFilter === 'speakers'
                    ? state.isSpeaker.has(m.id)
                    : ['organizer', 'admin'].includes(m.role)
                );
            }
            if (state.eventFilterId !== 'all') {
                res = res.filter(m => state.speakersByProfileId.get(m.id)?.has(state.eventFilterId));
            }
            if (state.countryFilterId !== 'all') {
                res = res.filter(m => m.country === state.countryFilterId);
            }
            if (state.searchQuery) {
                const q = state.searchQuery.toLowerCase();
                res = res.filter(m =>
                    (m.full_name || "").toLowerCase().includes(q) ||
                    (m.affiliation || "").toLowerCase().includes(q)
                );
            }
            if (state.selectedTags.size > 0) {
                res = res.filter(m => {
                    for (const tg of state.selectedTags) if (state.tagIndex.get(tg)?.has(m.id)) return true;
                    return false;
                });
            }
            const k = state.sort.key, d = state.sort.dir === 'asc' ? 1 : -1;
            return res.sort((a, b) =>
                k === 'connections'
                    ? (state.connections.filter(c => c.source === a.id || c.target === a.id).length -
                       state.connections.filter(c => c.source === b.id || c.target === b.id).length) * d
                    : ((a[k === 'name' ? 'full_name' : k] || "").localeCompare(b[k === 'name' ? 'full_name' : k] || "")) * d
            );
        }

        /* ─────────────────────────────────────────────
           TABLE
        ───────────────────────────────────────────── */
        function renderTable(list) {
            const l = t[state.lang] || t.en;
            $$('th[data-i18n]').forEach(th => { const key = th.dataset.i18n; if (l[key]) th.innerText = l[key]; });
            $('#members-table-body').innerHTML = list.map(m => {
                const n = m.full_name || 'Member';
                const c = state.connections.filter(x => x.source === m.id || x.target === m.id).length;
                return `
                <tr class="hover:bg-gray-50 cursor-pointer transition-colors"
                    onclick="document.dispatchEvent(new CustomEvent('openProfile',{detail:'${m.id}'}))">
                    <td class="py-2.5 px-6 border-b border-gray-50 font-medium text-slate-900">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center overflow-hidden text-xs text-slate-500 font-bold shrink-0 ring-1 ring-gray-100">
                                ${m.avatar_url ? `<img src="${m.avatar_url}" class="w-full h-full object-cover" loading="lazy" decoding="async" alt="${n}">` : n[0].toUpperCase()}
                            </div>
                            <span>${highlight(n, state.searchQuery)}</span>
                        </div>
                    </td>
                    <td class="py-2.5 px-6 border-b border-gray-50 text-slate-500">${highlight(m.affiliation || '—', state.searchQuery)}</td>
                    <td class="py-2.5 px-6 border-b border-gray-50 text-slate-500">
                        <span class="px-2 py-0.5 rounded text-xs bg-slate-100 text-slate-600">
                            ${m.role ? m.role.charAt(0).toUpperCase() + m.role.slice(1) : 'Member'}
                        </span>
                    </td>
                    <td class="py-2.5 px-6 border-b border-gray-50 text-slate-500">
                        ${m.country ? (state.countries[m.country] || m.country) : '—'}
                    </td>
                    <td class="py-2.5 px-6 border-b border-gray-50 text-right">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-slate-100 text-slate-600">${c}</span>
                    </td>
                </tr>`;
            }).join('');
            list.forEach(m => {
                if (m.avatar_url && !m.avatar_url.startsWith('http')) {
                    getAvatarUrl(m.avatar_url).then(u => {
                        const img = document.querySelector(`tr[onclick*="${m.id}"] img`);
                        if (img && u) img.src = u;
                    });
                }
            });
        }
        document.addEventListener('openProfile', e => openProfileModal(state.profileById.get(e.detail)));

        /* ─────────────────────────────────────────────
           FILTER CHANGE HANDLER
        ───────────────────────────────────────────── */
        function onFiltersChanged() {
            state.searchQuery         = $('#searchInput').value;
            state.treemapDrilledGroup = null;
            populateTagFilters();
            const list = getFiltered();
            renderTable(list);
            renderGraph(list);
        }

        /* ─────────────────────────────────────────────
           INIT
        ───────────────────────────────────────────── */
        (async function () {
            initSharedUI({
                onLangSwitch: () => {
                    state.lang = state.lang === 'en' ? 'es' : 'en';
                    localStorage.setItem("lang", state.lang);
                    applyLocalTranslations();
                },
                onSignOut: signOut
            });
            applyLocalTranslations();

            /* ── Drag handle resizer ── */
            const resizer   = document.getElementById('dragHandle');
            const topEl     = document.getElementById('network-container');
            const container = document.getElementById('right-column');
            let startY, startH;

            const stopDrag = () => {
                document.documentElement.removeEventListener('mousemove', doDrag);
                document.documentElement.removeEventListener('mouseup',  stopDrag);
                resizer.classList.remove('dragging');
                document.body.style.cursor = '';
                topEl.style.pointerEvents  = 'auto';
                if (state.viewMode === 'bubble') fitGraph();
                else {
                    /* Re-seed dimensions after resize */
                    const tr2 = document.getElementById('treemapRoot');
                    state.tmW = tr2.offsetWidth;
                    state.tmH = tr2.offsetHeight;
                    scheduleTreemapRender(getFiltered());
                }
            };
            const doDrag = e => {
                const h = startH + (e.clientY - startY);
                if (h > 200 && h < container.offsetHeight - 200) {
                    topEl.style.height = `${h}px`;
                    if (state.viewMode === 'bubble') requestAnimationFrame(fitGraph);
                }
            };
            resizer.addEventListener('mousedown', e => {
                e.preventDefault();
                startY = e.clientY;
                startH = parseInt(getComputedStyle(topEl).height, 10);
                document.documentElement.addEventListener('mousemove', doDrag);
                document.documentElement.addEventListener('mouseup',  stopDrag);
                resizer.classList.add('dragging');
                document.body.style.cursor    = 'row-resize';
                topEl.style.pointerEvents     = 'none';
            });

            /* ── Profile link clicks ── */
            document.addEventListener('click', e => {
                if (e.target.closest('#btnProfile') || e.target.closest('#userName'))
                    window.location.href = 'profile.html';
            });

            /* ── Role filter buttons ── */
            $$('[data-role]').forEach(b => b.onclick = e => {
                $$('[data-role]').forEach(x => x.className = "px-3 py-1 text-[11px] font-bold rounded-full transition-all border border-gray-200 text-slate-500 hover:bg-gray-50");
                e.target.className = "px-3 py-1 text-[11px] font-bold rounded-full transition-all shadow-sm bg-slate-800 text-white";
                state.roleFilter = e.target.dataset.role;
                onFiltersChanged();
            });

            /* ── Table sort ── */
            $$('th[data-sort]').forEach(th => th.onclick = () => {
                const k = th.dataset.sort;
                state.sort.dir = (state.sort.key === k && state.sort.dir === 'asc') ? 'desc' : 'asc';
                state.sort.key = k;
                $$('th[data-sort]').forEach(h => h.className = "py-3 px-6 text-[11px] font-bold text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100 transition-colors");
                th.className = `py-3 px-6 text-[11px] font-bold text-brand-600 uppercase tracking-wider cursor-pointer hover:bg-gray-100 transition-colors sort-${state.sort.dir}`;
                onFiltersChanged();
            });

            /* ── Dropdowns ── */
            $('#groupByFilter').onchange = e => { state.groupBy      = e.target.value; onFiltersChanged(); };
            $('#eventFilter').onchange   = e => { state.eventFilterId = e.target.value; onFiltersChanged(); };
            $('#countryFilter').onchange = e => { state.countryFilterId = e.target.value; onFiltersChanged(); };
            $('#searchInput').oninput    = debounce(onFiltersChanged);
            $('#clearFiltersBtn').onclick = () => $('#resetViewBtn').click();

            /* ── View toggle ── */
            $('#viewToggleBtn').onclick = () => {
                const btn  = $('#viewToggleBtn');
                const icon = btn.querySelector('i');
                state.viewMode            = state.viewMode === 'network' ? 'bubble' : 'network';
                state.treemapDrilledGroup = null;
                const l                   = t[state.lang] || t.en;
                $('#viewModeText').innerText = state.viewMode === 'network' ? l.switchBub : l.switchNet;
                if (icon) icon.setAttribute('data-lucide', state.viewMode === 'network' ? 'layout-grid' : 'share-2');
                state.zoom = 1; state.panOffset = { x: 0, y: 0 };
                if (window.lucide) window.lucide.createIcons();
                const list = getFiltered();
                renderTable(list);
                renderGraph(list);
            };

            /* ── Reset view ── */
            $('#resetViewBtn').onclick = () => {
                state.searchQuery         = '';
                state.groupBy             = 'affiliation';
                state.eventFilterId       = 'all';
                state.countryFilterId     = 'all';
                state.roleFilter          = 'all';
                state.selectedTags.clear();
                state.sort                = { key: "connections", dir: "desc" };
                state.treemapDrilledGroup = null;

                $('#searchInput').value   = '';
                $('#groupByFilter').value = 'affiliation';
                $('#eventFilter').value   = 'all';
                $('#countryFilter').value = 'all';

                $$('[data-role]').forEach(x => x.className = "px-3 py-1 text-[11px] font-bold rounded-full transition-all border border-gray-200 text-slate-500 hover:bg-gray-50");
                $('[data-role="all"]').className = "px-3 py-1 text-[11px] font-bold rounded-full transition-all shadow-sm bg-slate-800 text-white";
                $$('th[data-sort]').forEach(h => h.className = "py-3 px-6 text-[11px] font-bold text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100 transition-colors");
                $('th[data-sort="connections"]').className = "py-3 px-6 text-[11px] font-bold text-brand-600 uppercase tracking-wider cursor-pointer hover:bg-gray-100 transition-colors sort-desc";

                onFiltersChanged();
            };

            /* ── Network container interaction ── */
            const cv = $('#network-container');
            let sx = 0, sy = 0, suppressClick = false, dragMoved = false, dsX = 0, dsY = 0;

            cv.addEventListener('click', e => {
                if (suppressClick) { e.preventDefault(); e.stopImmediatePropagation(); suppressClick = false; }
            }, true);

            cv.onmousemove = e => {
                if (state.viewMode === 'network') return;
                if (state.isDragging) {
                    if (!dragMoved && ((e.clientX - dsX) ** 2 + (e.clientY - dsY) ** 2) > 16) dragMoved = true;
                    state.panOffset.x = e.clientX - sx;
                    state.panOffset.y = e.clientY - sy;
                    if (!transformRafId) transformRafId = requestAnimationFrame(() => { updateTransform(); transformRafId = null; });
                } else {
                    const r    = cv.getBoundingClientRect();
                    mousePos.x = e.clientX - r.left;
                    mousePos.y = e.clientY - r.top;
                    /* Only schedule if not already pending */
                    if (!visualRafId) visualRafId = requestAnimationFrame(updateVisuals);
                }
            };

            cv.onmouseleave = () => {
                if (state.viewMode !== 'network') resetMagnification();
            };

            cv.onmousedown = e => {
                if (state.viewMode === 'network') return;
                const node = e.target.closest('.network-node');
                if (!node || node.dataset.type === 'group') {
                    state.isDragging = true;
                    dragMoved = false;
                    dsX = e.clientX; dsY = e.clientY;
                    sx  = e.clientX - state.panOffset.x;
                    sy  = e.clientY - state.panOffset.y;
                    cv.style.cursor = 'grabbing';
                    /* Promote canvas layer only during drag */
                    $('#networkCanvas').style.willChange = 'transform';
                    resetMagnification();
                }
            };

            window.onmouseup = () => {
                if (state.isDragging && dragMoved) suppressClick = true;
                state.isDragging = false;
                cv.style.cursor  = state.viewMode === 'network' ? 'default' : 'grab';
                /* Demote will-change after drag */
                $('#networkCanvas').style.willChange = 'auto';
            };

            cv.onwheel = e => {
                if (state.viewMode === 'network') return;
                e.preventDefault();
                pendingWheelScale *= (e.deltaY > 0 ? 0.9 : 1.1);
                if (!wheelRafId) {
                    wheelRafId = requestAnimationFrame(() => {
                        state.zoom    = clamp(state.zoom * pendingWheelScale, 0.1, 5);
                        pendingWheelScale = 1;
                        updateTransform();
                        wheelRafId = null;
                    });
                }
            };

            /* Touch support */
            cv.ontouchstart = e => {
                if (state.viewMode === 'network') return;
                const node = e.target.closest('.network-node');
                if (!node || node.dataset.type === 'group') {
                    state.isDragging = true;
                    dragMoved = false;
                    dsX = e.touches[0].clientX; dsY = e.touches[0].clientY;
                    sx  = e.touches[0].clientX - state.panOffset.x;
                    sy  = e.touches[0].clientY - state.panOffset.y;
                }
            };
            cv.ontouchmove = e => {
                if (state.viewMode === 'network' || !state.isDragging) return;
                e.preventDefault();
                if (!dragMoved && ((e.touches[0].clientX - dsX) ** 2 + (e.touches[0].clientY - dsY) ** 2) > 16) dragMoved = true;
                state.panOffset.x = e.touches[0].clientX - sx;
                state.panOffset.y = e.touches[0].clientY - sy;
                if (!transformRafId) transformRafId = requestAnimationFrame(() => { updateTransform(); transformRafId = null; });
            };
            cv.ontouchend = () => {
                if (state.isDragging && dragMoved) suppressClick = true;
                state.isDragging = false;
            };

            if (window.lucide) window.lucide.createIcons();

            /* ── Auth + data ── */
            const [authRes] = await Promise.all([
                initAuth({
                    onAuthReady:  () => { renderHeader(authState, t, state.lang); applyLocalTranslations(); },
                    onAuthChange: () => renderHeader(authState, t, state.lang)
                }),
                loadNetworkData()
            ]);

            $('#loadingScreen').classList.add('opacity-0', 'pointer-events-none');
            $('#signinGate').style.display = authState.session ? 'none' : 'flex';
        })();
    </script>
</body>
</html>
