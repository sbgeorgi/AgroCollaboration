<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50 antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Agrovoltaicos sin Fronteras • Organizations</title>
    <script src="auth-preloader.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="theme.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style type="text/tailwindcss">
        @layer utilities { .bg-dot-pattern { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; } .text-pretty { text-wrap: pretty; } }
        .org-img { transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1); }
        .group:hover .org-img { transform: scale(1.05); }
    </style>
</head>

<body class="text-slate-800 flex flex-col h-full overflow-hidden font-sans bg-slate-50">
    <main class="flex-1 relative overflow-hidden flex flex-col bg-dot-pattern">
        <div class="flex-none px-6 py-4 md:px-8 flex flex-col md:flex-row gap-2 justify-between items-center z-20 bg-white/90 backdrop-blur-md border-b border-gray-200 shadow-sm min-h-[4rem]">
            <div class="flex items-center h-full">
                <h2 class="font-bold text-xl text-slate-900 tracking-tight" data-i18n="orgs.title">Partner Organizations</h2>
                <div class="h-5 w-px bg-slate-300 mx-4 hidden sm:block"></div>
                <span class="font-bold text-xs text-slate-400 uppercase tracking-[0.15em] hidden sm:block" data-i18n="orgs.breadcrumb">Research Network</span>
            </div>
            <div class="hidden md:flex gap-2">
                <span class="px-3 py-1 bg-slate-50 border border-gray-200 rounded-full text-[10px] font-bold text-slate-400 uppercase tracking-wide">4 Partners</span>
            </div>
        </div>

        <div class="flex-1 p-4 md:p-6 min-h-0 overflow-y-auto overflow-x-hidden scroll-smooth">
            <!-- Container for Dynamic Orgs -->
            <div id="orgs-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full max-w-[1920px] mx-auto pb-10 min-h-full auto-rows-fr">
                <!-- Skeleton -->
                <div class="animate-pulse bg-white rounded-2xl border border-gray-200 h-64 w-full"></div>
                <div class="animate-pulse bg-white rounded-2xl border border-gray-200 h-64 w-full"></div>
                <div class="animate-pulse bg-white rounded-2xl border border-gray-200 h-64 w-full"></div>
                <div class="animate-pulse bg-white rounded-2xl border border-gray-200 h-64 w-full"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { renderLayout } from './layout.js';
        import { authState, initAuth, signOut } from './auth.js';
        import { initSharedUI, renderHeader, applyI18n, getAvatarUrl, show, hide, $ } from './ui.js';
        import { loadOrgGrid } from './copy.js';

        renderLayout('organizations');

        const state = { language: localStorage.getItem("lang") || "en" };
        const t = { en: { orgs: { title: "Partner Organizations", breadcrumb: "Research Network" } }, es: { orgs: { title: "Organizaciones Asociadas", breadcrumb: "Red de Investigación" } } };

        async function applyPageI18n() {
            applyI18n(t, state.language);
            await loadOrgGrid('orgs-grid', state.language);
        }

        function handleLangSwitch() {
            state.language = state.language === 'en' ? 'es' : 'en';
            localStorage.setItem("lang", state.language);
            applyPageI18n();
        }

        (async function main() {
            initSharedUI({ onLangSwitch: handleLangSwitch, onSignOut: signOut });
            lucide.createIcons();

            applyPageI18n(); // Load immediately

            document.addEventListener('click', e => {
                if (e.target.closest('#btnProfile') || e.target.closest('#userName') || e.target.closest('#mobileProfileBtn') || e.target.closest('#mobileUserName')) {
                    window.location.href = 'profile.html';
                }
            });

            await initAuth({
                onAuthReady: () => renderHeader(authState, t, state.language),
                onAuthChange: async () => {
                    renderHeader(authState, t, state.language);
                    if (authState.profile?.avatar_url) {
                        const url = await getAvatarUrl(authState.profile.avatar_url);
                        const img = $('#userAvatar');
                        if (img && url) { img.src = url; show(img); hide($('#userInitial')); }
                    }
                }
            });
        })();
    </script>
</body>
</html>
