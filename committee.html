<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50 antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Agrovoltaicos sin Fronteras • Steering Committee</title>
  <script src="auth-preloader.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="theme.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style type="text/tailwindcss">
    @layer utilities { .bg-dot-pattern { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; } }
    .line-clamp-responsive { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    @media (min-width: 640px) { .line-clamp-responsive { -webkit-line-clamp: 4; } }
    .profile-img { transition: transform 0.7s ease; }
    .group:hover .profile-img { transform: scale(1.05); }
  </style>
</head>

<body class="text-slate-800 flex flex-col h-full font-sans bg-slate-50">
  <main class="flex-1 relative overflow-hidden flex flex-col bg-dot-pattern">
    <div class="flex-none px-4 sm:px-6 py-3 flex flex-row gap-2 justify-between items-center z-20 bg-white/90 backdrop-blur-md border-b border-gray-200 shadow-sm h-14">
      <div class="flex items-center gap-2 sm:gap-3 min-w-0">
        <h2 class="font-display font-bold text-base sm:text-lg text-slate-900 tracking-tight leading-none truncate sm:truncate-none" data-i18n="committee.title">Leadership Team</h2>
        <div class="hidden sm:block h-4 w-px bg-slate-300 mx-1 flex-shrink-0"></div>
        <span class="hidden sm:inline text-[10px] font-bold uppercase tracking-widest text-slate-400 whitespace-nowrap" data-i18n="committee.breadcrumb">Steering Committee</span>
      </div>
      <div class="hidden md:flex gap-2 flex-shrink-0">
        <span class="px-2 py-0.5 bg-white border border-gray-200 rounded text-[9px] font-bold text-slate-500 uppercase tracking-wide whitespace-nowrap" data-i18n="committee.stat_members">9 Members</span>
        <span class="px-2 py-0.5 bg-white border border-gray-200 rounded text-[9px] font-bold text-slate-500 uppercase tracking-wide whitespace-nowrap" data-i18n="committee.stat_inst">4 Institutions</span>
      </div>
    </div>

    <div class="flex-1 p-2 sm:p-3 min-h-0 overflow-y-auto sm:overflow-hidden">
      <!-- Container for Dynamic Members -->
      <div id="committee-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 sm:grid-rows-3 sm:h-full gap-2 sm:gap-3 w-full max-w-[1920px] mx-auto">
        <!-- Skeleton -->
        <div class="animate-pulse bg-white rounded-xl border border-gray-200 h-32 sm:h-full w-full"></div>
        <div class="animate-pulse bg-white rounded-xl border border-gray-200 h-32 sm:h-full w-full"></div>
        <div class="animate-pulse bg-white rounded-xl border border-gray-200 h-32 sm:h-full w-full"></div>
        <div class="animate-pulse bg-white rounded-xl border border-gray-200 h-32 sm:h-full w-full hidden md:block"></div>
      </div>
      <div class="h-4 sm:hidden"></div>
    </div>
  </main>

  <script type="module">
    import { renderLayout } from './layout.js';
    import { authState, initAuth, signOut } from './auth.js';
    import { initSharedUI, renderHeader, applyI18n, getAvatarUrl, show, hide, $ } from './ui.js';
    import { loadCommitteeGrid } from './copy.js';

    renderLayout('committee');

    const state = { language: localStorage.getItem("lang") || "en" };
    const t = { en: { committee: { title: "Leadership Team", breadcrumb: "Steering Committee", stat_members: "9 Members", stat_inst: "4 Institutions" } }, es: { committee: { title: "Equipo de Liderazgo", breadcrumb: "Comité Directivo", stat_members: "9 Miembros", stat_inst: "4 Instituciones" } } };

    async function applyPageI18n() {
      applyI18n(t, state.language);
      await loadCommitteeGrid('committee-grid', state.language);
    }

    function handleLangSwitch() {
      state.language = state.language === 'en' ? 'es' : 'en';
      localStorage.setItem("lang", state.language);
      applyPageI18n();
    }

    (async function main() {
      initSharedUI({ onLangSwitch: handleLangSwitch, onSignOut: signOut });
      lucide.createIcons();
      
      applyPageI18n(); // Load content immediately

      document.addEventListener('click', e => {
        if (e.target.closest('#btnProfile') || e.target.closest('#userName') || e.target.closest('#mobileProfileBtn') || e.target.closest('#mobileUserName')) {
          window.location.href = 'profile.html';
        }
      });

      await initAuth({
        onAuthReady: () => renderHeader(authState, t, state.language),
        onAuthChange: async () => {
          renderHeader(authState, t, state.language);
          if (authState.profile?.avatar_url) {
            const url = await getAvatarUrl(authState.profile.avatar_url);
            const img = $('#userAvatar');
            if (img && url) { img.src = url; show(img); hide($('#userInitial')); }
          }
        }
      });
    })();
  </script>
</body>
</html>
