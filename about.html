<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50 antialiased">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>About • Agrovoltaicos sin Fronteras</title>
  <meta name="description" content="Learn about the Agrovoltaicos sin Fronteras seminar series.">

  <!-- Critical pre-render script -->
  <script src="auth-preloader.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="theme.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style type="text/tailwindcss">
    @layer utilities {
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
      .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: #94a3b8; border: 2px solid transparent; background-clip: content-box; }

      .bg-dot-pattern {
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 24px 24px;
      }
    }

    .prose { max-width: none; }
    .prose p { margin-bottom: 0.85em; line-height: 1.7; color: #475569; }
    .prose h2 { color: #0f172a; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.25rem; letter-spacing: -0.015em; }
    .prose a { color: #0369a1; text-decoration: none; font-weight: 600; border-bottom: 1px solid #bae6fd; transition: border-color 0.2s; }
    .prose a:hover { border-color: #0284c7; }
  </style>
</head>

<body class="text-slate-800 flex flex-col h-full overflow-hidden font-sans bg-slate-50">

  <!-- ================= MAIN CONTENT CONTAINER ================= -->
  <main class="flex-1 relative overflow-hidden flex flex-col bg-dot-pattern">

    <!-- PAGE HEADER -->
    <div class="flex-none px-8 py-4 flex flex-col md:flex-row gap-2 justify-between items-center z-20 bg-white border-b border-gray-200 shadow-sm min-h-[4rem] h-auto shrink-0">
      <div class="flex items-center h-full">
        <!-- Replaced data-i18n with data-copy-key to prevent conflicts -->
        <h2 class="font-bold text-xl text-slate-900 tracking-tight" data-copy-key="about_title">
          About the Seminar
        </h2>
        <div class="h-5 w-px bg-slate-300 mx-4"></div>
        <span class="font-bold text-xs text-slate-400 uppercase tracking-[0.15em]" data-copy-key="about_subtitle">
          Overview
        </span>
      </div>
      <div class="hidden md:flex gap-2">
        <span class="px-3 py-1 bg-slate-50 border border-gray-200 rounded text-[10px] font-bold text-slate-400 uppercase tracking-wide" data-copy-key="about_badge">
          Bilingual Series
        </span>
      </div>
    </div>

    <!-- SCROLLABLE CONTENT AREA -->
    <div class="flex-1 min-h-0 overflow-y-auto custom-scrollbar p-4">

      <div class="w-full mx-auto pb-24">

        <!-- Main Card -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden flex flex-col w-full">

          <!-- Hero Image -->
          <div class="relative h-48 md:h-60 w-full group shrink-0">
            <img src="static/agrivUA.jpg"
              alt="Agrivoltaic solar panels over a field of crops at the University of Arizona"
              class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/70 via-transparent to-transparent"></div>
            <div class="absolute bottom-5 left-6 md:left-10 text-white">
              
              <!-- DYNAMIC HERO TITLE -->
              <!-- Removed data-i18n -->
              <h1 class="font-display font-bold text-3xl tracking-tight mb-1 drop-shadow-md text-white" data-copy-key="about_hero_title">
                Bridging Research
              </h1>
              
              <!-- DYNAMIC HERO SUBTITLE -->
              <!-- Removed data-i18n -->
              <p class="text-sm opacity-90 font-medium drop-shadow-sm tracking-wide" data-copy-key="about_hero_sub">
                Agrivoltaics across the Americas
              </p>
            </div>
          </div>

          <!-- Content Text Area -->
          <div class="p-6 md:p-10 w-full">

            <!-- DYNAMIC BODY CONTENT -->
            <div class="prose w-full animate-fade-in" data-copy-key="about_body">
                <!-- Skeleton Loader -->
                <div class="animate-pulse space-y-4">
                    <div class="h-4 bg-slate-100 rounded w-3/4"></div>
                    <div class="h-4 bg-slate-100 rounded w-full"></div>
                    <div class="h-4 bg-slate-100 rounded w-5/6"></div>
                    <div class="h-32 bg-slate-50 rounded w-full mt-6"></div>
                </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ================= JAVASCRIPT LOGIC ================= -->
  <script type="module">
    import { renderLayout } from './layout.js';
    import { authState, initAuth, signOut } from './auth.js';
    import { initSharedUI, renderHeader, applyI18n, tr, show, hide, getAvatarUrl, $ } from './ui.js';
    import { loadAndApplyCopy } from './copy.js';

    renderLayout('about');

    const state = { language: localStorage.getItem("lang") || "en" };

    // Cleaned up the 't' object. The about_page text is now exclusively handled by Supabase site_copy
    const t = {
      en: {
        nav: { schedule: "Schedule", archive: "Archive", about: "About", network: "Network", map: "Map", admin: "Admin" },
        auth: { signin: "Sign in", signout: "Sign out" }
      },
      es: {
        nav: { schedule: "Programa", archive: "Archivo", about: "Acerca de", network: "Red", map: "Mapa", admin: "Admin" },
        auth: { signin: "Ingresar", signout: "Salir" }
      }
    };

    async function applyPageI18n() {
      // 1. Apply hardcoded nav/header translations
      applyI18n(t, state.language);
      
      // 2. Adjust Language Switcher UI in Header
      const s = document.querySelector('#langSwitchDesktop div:last-child');
      if (s) {
        s.style.transform = state.language === 'es' ? 'translateX(100%)' : 'translateX(0)';
        s.innerText = state.language.toUpperCase();
      }

      // 3. Fetch & Apply Dynamic Database Content (with caching)
      await loadAndApplyCopy('about', state.language);
    }

    function handleLangSwitch() {
      state.language = state.language === 'en' ? 'es' : 'en';
      localStorage.setItem("lang", state.language);
      applyPageI18n();
    }

    (async function main() {
      initSharedUI({ onLangSwitch: handleLangSwitch, onSignOut: signOut });
      lucide.createIcons();

      // FIRE COPY LOAD IMMEDIATELY FOR SPEED
      applyPageI18n();

      document.addEventListener('click', e => {
        if (e.target.closest('#btnProfile') || e.target.closest('#userName') ||
          e.target.closest('#mobileProfileBtn') || e.target.closest('#mobileUserName')) {
          window.location.href = 'profile.html';
        }
      });

      await initAuth({
        onAuthReady: () => {
          renderHeader(authState, t, state.language);
        },
        onAuthChange: async () => {
          renderHeader(authState, t, state.language);
          if (authState.profile?.avatar_url) {
            const url = await getAvatarUrl(authState.profile.avatar_url);
            const img = $('#userAvatar');
            if (url && img) { img.src = url; show(img); hide($('#userInitial')); }
          }
        }
      });
    })();
  </script>

</body>

</html>
